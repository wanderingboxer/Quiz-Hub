services:
  - type: web
    name: quiz-hub-backend
    env: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: HOST_ACCESS_CODE
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://quiz-hub-frontend.onrender.com

  - type: web
    name: quiz-hub-frontend
    env: static
    buildCommand: pnpm install && pnpm --filter @workspace/kahoot-clone run build
    staticPublishPath: ./artifacts/kahoot-clone/dist/public
    envVars:
      # NOTE: Update this URL if the quiz-hub-backend service is renamed or redeployed.
      - key: VITE_API_ORIGIN
        value: https://quiz-hub-backend-y1u6.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
